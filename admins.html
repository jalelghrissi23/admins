<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Server Administrators</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Verdana', sans-serif;
            padding: 20px;
            min-height: 100vh;
            color: #e0e4f0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2a3f6e;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #6c8fc7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        .header p {
            color: #8e9bbe;
            font-size: 12px;
            margin-top: 8px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #2a3f6e;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat-card {
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            display: block;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8e9bbe;
        }
        .online-stat .stat-number { color: #4ade80; }
        .offline-stat .stat-number { color: #f87171; }
        .total-stat .stat-number { color: #60a5fa; }

        .admin-table {
            background: #0f1422;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1e2a44;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .admin-header {
            display: grid;
            grid-template-columns: 40px 3fr 2fr 1.5fr;
            background: #1a2338;
            padding: 12px 16px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            color: #9eb4e6;
            border-bottom: 1px solid #2a3f6e;
        }
        .admin-row {
            display: grid;
            grid-template-columns: 40px 3fr 2fr 1.5fr;
            padding: 12px 16px;
            border-bottom: 1px solid #1a2338;
            transition: background 0.2s;
            align-items: center;
        }
        .admin-row:hover {
            background: #151e30;
        }
        .admin-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
        .status-offline { background: #6b7280; }
        .admin-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .admin-flags {
            background: #2a3f6e;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-family: monospace;
            letter-spacing: 0.5px;
            color: #bfd6ff;
        }
        .admin-grade {
            color: #ffd966;
            font-weight: 500;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            background: #2e3b4e;
            color: #ddd;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #4a5a7a;
            margin-top: 20px;
            padding: 12px;
            border-top: 1px solid #1e2a44;
        }
        @media (max-width: 600px) {
            .admin-header, .admin-row {
                grid-template-columns: 30px 2fr 2fr 1fr;
                gap: 6px;
                font-size: 11px;
            }
            .admin-name { font-size: 12px; }
            .admin-flags { font-size: 8px; padding: 2px 5px; }
        }
        @media (max-width: 480px) {
            .stats-bar { flex-direction: column; text-align: center; gap: 8px; }
            .admin-header, .admin-row {
                grid-template-columns: 1fr;
                gap: 6px;
                text-align: center;
            }
            .admin-header { display: none; }
            .admin-row {
                border-bottom: 1px solid #2a3f6e;
                padding: 12px;
            }
            .admin-name { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚔️ Server Administration ⚔️</h1>
        <p>Zombie Plague 6.0 • Live Data</p>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-card total-stat"><span class="stat-number" id="totalCount">0</span><span class="stat-label">Total Admins</span></div>
        <div class="stat-card online-stat"><span class="stat-number" id="onlineCount">0</span><span class="stat-label">Online</span></div>
        <div class="stat-card offline-stat"><span class="stat-number" id="offlineCount">0</span><span class="stat-label">Offline</span></div>
    </div>

    <div class="admin-table">
        <div class="admin-header">
            <span>#</span>
            <span>Admin Name</span>
            <span>Rank / Grade</span>
            <span>Flags</span>
        </div>
        <div id="adminListContainer">
            <!-- admins will be injected here -->
            <div style="padding: 40px; text-align: center; color: #6c7a9e;">Loading admin data...</div>
        </div>
    </div>
    <div class="footer">
        Data fetched live from game server • Auto-generated by ZP60 Admin MOTD
    </div>
</div>

<script>
    (function() {
        // Get URL parameters
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (const [key, value] of params.entries()) {
                result[key] = value;
            }
            return result;
        }

        // Parse the plugin's format: n1, l1, f1, o1, n2, l2, ...
        function parseAdminsFromURL() {
            const params = getQueryParams();
            const total = parseInt(params['total']) || 0;

            if (total === 0) {
                return [];
            }

            const admins = [];
            for (let i = 1; i <= total; i++) {
                const name = params['n' + i] || 'Unknown';
                const grade = params['l' + i] || 'Player';
                const flags = params['f' + i] || '';
                const online = params['o' + i] === '1';

                admins.push({
                    name: decodeURIComponent(name),
                    grade: decodeURIComponent(grade),
                    flags: flags,
                    online: online,
                    index: i
                });
            }
            return admins;
        }

        // Render the admin list
        function renderAdminList() {
            const admins = parseAdminsFromURL();

            const totalCount = admins.length;
            const onlineCount = admins.filter(a => a.online).length;
            const offlineCount = totalCount - onlineCount;

            // Update stats bar
            document.getElementById('totalCount').innerText = totalCount;
            document.getElementById('onlineCount').innerText = onlineCount;
            document.getElementById('offlineCount').innerText = offlineCount;

            const container = document.getElementById('adminListContainer');
            if (!container) return;

            if (totalCount === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #ffaa66;">📋 No admins are currently registered in the system.</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < admins.length; i++) {
                const admin = admins[i];
                const statusClass = admin.online ? 'status-online' : 'status-offline';
                const statusText = admin.online ? 'Online' : 'Offline';
                const flagsHtml = admin.flags ? `<span class="admin-flags">${escapeHtml(admin.flags)}</span>` : '<span class="admin-flags" style="opacity:0.5;">—</span>';

                html += `
                    <div class="admin-row">
                        <div class="admin-number">${admin.index}</div>
                        <div class="admin-name">
                            <span class="admin-status ${statusClass}"></span>
                            <span>${escapeHtml(admin.name)}</span>
                            <span class="badge" style="background: ${admin.online ? '#2a5a3a' : '#3a3a5a'};">${statusText}</span>
                        </div>
                        <div class="admin-grade">${escapeHtml(admin.grade)}</div>
                        <div class="admin-flags-wrapper">${flagsHtml}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Helper: basic HTML escaping
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Run when page loads
        window.addEventListener('DOMContentLoaded', renderAdminList);
    })();
</script>
</body>
</html>
